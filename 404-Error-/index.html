<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Page Not Found</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap");

    :root {
      --bg: #ece7df;
      --ink: #12100d;
      --muted: #4d4842;
      --giant: #b3a28e;
      --character-width: min(460px, 60vw);
      --character-top: clamp(84px, 12vh, 118px);
      --digit-gap: clamp(2px, 0.5vw, 10px);
      --copy-top: clamp(350px, 51vh, 455px);
      --btn-dark: #24211d;
      --btn-green-top: #9ebd73;
      --btn-green-bottom: #789851;
      --page-inline: clamp(14px, 4vw, 28px);
      --page-bottom: clamp(20px, 4vh, 38px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: radial-gradient(circle at 50% 80%, #f7f4ef 0 22%, var(--bg) 58%, #ded5c9 100%);
      color: var(--ink);
      font-family: "Outfit", "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(0, 0, 0, 0.028) 0.55px, transparent 0.55px);
      background-size: 2px 2px;
      opacity: 0.2;
    }

    .page {
      width: min(1220px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: 22px var(--page-inline) var(--page-bottom);
      position: relative;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 5;
    }

    .logo {
      margin: 0;
      font-size: 2.2rem;
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .logo span {
      font-weight: 400;
    }

    .menu {
      justify-self: center;
      display: flex;
      gap: clamp(12px, 2vw, 32px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      text-decoration: none;
      color: #201d19;
      font-weight: 500;
      opacity: 0.92;
      transition: opacity 0.14s ease;
    }

    .menu a:hover,
    .menu a:focus-visible {
      opacity: 0.58;
      outline: none;
    }

    .member-btn {
      text-decoration: none;
      color: #f7f2ea;
      background: var(--btn-dark);
      border: 1px solid #3a342d;
      border-radius: 999px;
      padding: 11px 21px;
      font-weight: 600;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }

    .member-btn:hover,
    .member-btn:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 11px 20px rgba(0, 0, 0, 0.22);
      outline: none;
    }

    .hero {
      position: relative;
      display: grid;
      place-items: center;
      min-height: clamp(520px, calc(100vh - 170px), 860px);
      min-height: clamp(520px, calc(100svh - 170px), 860px);
      padding-bottom: clamp(12px, 3vh, 28px);
    }

    .digit {
      position: absolute;
      top: var(--character-top);
      font-size: clamp(9.2rem, 29vw, 26rem);
      line-height: 0.82;
      font-weight: 800;
      color: var(--giant);
      letter-spacing: -0.06em;
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    .digit.left {
      left: calc(50% - (var(--character-width) / 2) - var(--digit-gap));
      transform: translateX(-100%);
    }

    .digit.right {
      left: calc(50% + (var(--character-width) / 2) + var(--digit-gap));
    }

    .character-wrap {
      position: absolute;
      top: var(--character-top);
      z-index: 3;
      width: var(--character-width);
      pointer-events: none;
      animation:
        character-pop-in 620ms cubic-bezier(0.22, 1, 0.36, 1) both,
        character-float 4.8s ease-in-out 620ms infinite;
    }

    .character {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.14));
      animation: character-breathe 3.6s ease-in-out infinite;
    }

    .copy {
      position: relative;
      z-index: 4;
      text-align: center;
      margin-top: var(--copy-top);
      padding: 0 14px 28px;
      width: min(700px, 100%);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 4.5vw, 3.9rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .copy p {
      margin: 0.5rem auto 0;
      max-width: 56ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.8vw, 1.23rem);
      line-height: 1.42;
    }

    .home-btn {
      margin-top: 15px;
      text-decoration: none;
      color: #f8fff4;
      border: 1px solid #8daa66;
      background: linear-gradient(180deg, var(--btn-green-top), var(--btn-green-bottom));
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px 9px 11px;
      font-size: clamp(1rem, 1.65vw, 1.25rem);
      font-weight: 600;
      box-shadow:
        0 8px 16px rgba(94, 121, 59, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .home-btn:hover,
    .home-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow:
        0 12px 20px rgba(94, 121, 59, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.42);
      outline: none;
    }

    .home-btn .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(27, 24, 20, 0.52);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.23);
      line-height: 1;
    }

    @keyframes character-float {
      0%,
      100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes character-pop-in {
      0% {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes character-breathe {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.012);
      }
    }

    @media (max-width: 980px) {
      :root {
        --character-width: min(420px, 78vw);
        --character-top: clamp(88px, 12vh, 118px);
        --digit-gap: clamp(2px, 0.4vw, 8px);
        --copy-top: clamp(300px, 50vh, 385px);
      }

      .page {
        padding-top: 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 12px;
      }

      .menu {
        width: 100%;
        gap: 8px clamp(12px, 3vw, 24px);
        order: 3;
      }

      .member-btn {
        order: 2;
      }

    }

    @media (max-width: 640px) {
      :root {
        --character-width: min(350px, 84vw);
        --character-top: clamp(104px, 18vh, 152px);
        --digit-gap: clamp(0px, 0.4vw, 6px);
        --copy-top: clamp(250px, 48vh, 320px);
      }

      .page {
        padding-top: 12px;
      }

      .hero {
        min-height: clamp(460px, calc(100svh - 120px), 640px);
      }

      .logo {
        font-size: 1.88rem;
      }

      .menu a {
        font-size: 0.94rem;
      }

      .member-btn {
        font-size: 0.92rem;
        padding: 8px 15px;
      }

      .digit {
        font-size: clamp(6.8rem, 36vw, 11.5rem);
      }

    }

    @media (max-width: 420px) {
      :root {
        --character-width: min(255px, 86vw);
        --character-top: clamp(86px, 18vh, 120px);
        --copy-top: clamp(180px, 42vh, 250px);
      }

      .page {
        padding-inline: 12px;
      }

      .logo {
        font-size: 1.58rem;
      }

      .menu {
        gap: 6px 12px;
      }

      .menu a {
        font-size: 0.87rem;
      }

      .member-btn {
        width: min(240px, 100%);
        text-align: center;
      }

      .digit {
        font-size: clamp(5.5rem, 34vw, 7.6rem);
      }

      .copy p {
        font-size: 0.95rem;
      }

      .home-btn {
        width: min(260px, 100%);
        justify-content: center;
      }

      .home-btn .icon {
        width: 28px;
        height: 28px;
      }
    }

    @media (max-height: 760px) and (min-width: 641px) {
      :root {
        --character-width: min(390px, 52vw);
        --character-top: clamp(66px, 9vh, 92px);
        --copy-top: clamp(260px, 44vh, 330px);
      }

      .hero {
        min-height: clamp(430px, calc(100svh - 140px), 640px);
      }
    }

    @media (max-height: 620px) {
      :root {
        --character-width: min(280px, 58vw);
        --character-top: clamp(60px, 12vh, 86px);
        --copy-top: clamp(185px, 46vh, 255px);
      }

      .hero {
        min-height: clamp(380px, calc(100svh - 120px), 520px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h2 class="logo">.<span>logo</span>.</h2>
      <nav class="menu" aria-label="Main navigation">
        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </nav>
      <a class="member-btn" href="#">Members Area</a>
    </header>

    <main class="hero">
      <div class="digit left" aria-hidden="true">4</div>
      <div class="digit right" aria-hidden="true">4</div>

      <div class="character-wrap" aria-hidden="true">
        <img
          class="character"
          src="./assets/character.png"
          alt="Confused character"
        />
      </div>

      <section class="copy">
        <h1>Page not found</h1>
        <p>Looks like something went wrong. We are working to fix it.</p>
        <a class="home-btn" href="/">
          <span class="icon" aria-hidden="true">&larr;</span>
          Back to Home
        </a>
      </section>
    </main>
  </div>
</body>
</html>
